syntax = "proto3";

package sensors;

enum CameraEncoding {
    UNKNOWN = 0;
    RGB8 = 1;
    BGR8 = 2;
    GRAY8 = 3;
    MJPEG = 4;
}

message CameraStreamRequest {
}

message CameraStreamReply {
    uint32 width = 1;
    uint32 height = 2;
    CameraEncoding encoding = 3;
    optional uint64 timestamp = 4;
    bytes image_data = 5;
}

service CameraService {
    rpc getCameraFrame(CameraStreamRequest) returns (stream CameraStreamReply);
}
